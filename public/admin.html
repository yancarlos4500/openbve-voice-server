<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Openbve Server Admin</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .admin-page {
        max-width: 1100px;
        margin: 0 auto;
        padding: 20px;
        color: #d7d7d7;
      }
      .admin-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }
      .admin-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .admin-btn {
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid #4a4a4a;
        background: #2a2a2a;
        color: #ddd;
        cursor: pointer;
      }
      .admin-btn.primary {
        background: linear-gradient(180deg, #deb847 0%, #a5770f 100%);
        color: #201602;
        border-color: #7d5a09;
        font-weight: 700;
      }
      .admin-status {
        margin-bottom: 12px;
        color: #a8b8c8;
        font-size: 0.9rem;
      }
      .admin-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .admin-panel {
        border: 1px solid #3a3a3a;
        border-radius: 10px;
        background: #1f1f1f;
        padding: 12px;
        min-height: 260px;
      }
      .admin-panel h2 {
        margin: 0 0 10px;
        font-size: 1rem;
        color: #d4a018;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      .admin-room-select {
        width: 100%;
        margin-bottom: 10px;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #444;
        background: #161616;
        color: #ddd;
      }
      .admin-list {
        display: grid;
        gap: 8px;
        max-height: 56vh;
        overflow: auto;
      }
      .admin-item {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: flex-start;
        padding: 8px;
        border: 1px solid #353535;
        border-radius: 8px;
        background: #242424;
      }
      .admin-item-actions {
        display: grid;
        gap: 6px;
      }
      .admin-item-actions.inline {
        grid-template-columns: 1fr auto auto;
        align-items: center;
      }
      .admin-input,
      .admin-select {
        padding: 6px 8px;
        border-radius: 5px;
        border: 1px solid #4a4a4a;
        background: #181818;
        color: #ddd;
      }
      .danger {
        border-color: #944;
        background: #3a1f1f;
        color: #ffb8b8;
      }
      @media (max-width: 900px) {
        .admin-grid {
          grid-template-columns: 1fr;
        }
        .admin-item-actions.inline {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="admin-page">
      <div class="admin-top">
        <div>
          <h1 style="margin:0; color:#d4a018;">Server Admin</h1>
          <div id="adminUser" style="font-size:0.9rem; color:#a8b8c8;"></div>
        </div>
        <div class="admin-actions">
          <button id="backBtn" class="admin-btn">Back To Radio</button>
          <button id="refreshBtn" class="admin-btn">Refresh</button>
          <button id="logoutBtn" class="admin-btn primary">Logout</button>
        </div>
      </div>

      <div id="adminStatus" class="admin-status">Loading...</div>

      <div class="admin-grid">
        <section id="createServerPanel" class="admin-panel" style="grid-column:1 / -1;">
          <h2>Create Server</h2>
          <form id="createServerForm" style="display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;">
            <input id="createServerName" class="admin-input" type="text" placeholder="New server name" maxlength="80" />
            <button type="submit" class="admin-btn primary">Create</button>
          </form>
          <div id="createServerError" style="margin-top:8px;font-size:0.85rem;color:#e9a3a3;"></div>
        </section>

        <section class="admin-panel">
          <h2>Online Members</h2>
          <select id="roomSelectMembers" class="admin-room-select"></select>
          <div id="membersList" class="admin-list"></div>
        </section>

        <section class="admin-panel">
          <h2>Roster</h2>
          <select id="roomSelectRoster" class="admin-room-select"></select>
          <div id="rosterList" class="admin-list"></div>
        </section>

        <section id="serverEditorPanel" class="admin-panel" style="grid-column:1 / -1;">
          <h2>Server Editor</h2>
          <div id="serversList" class="admin-list"></div>
        </section>
      </div>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
