<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Openbve Radio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Room Selection Modal -->
    <div id="roomSelectionModal" class="modal-overlay">
      <div class="modal-content">
        <h2>Select a Server</h2>

        <!-- Join Room Tab -->
        <div id="join-room" class="modal-tab-content active">
          <div id="roomList" class="room-list">
            <div class="loading">Loading servers...</div>
          </div>
        </div>
      </div>
    </div>

    <main class="app-shell">
      <section class="title-panel">
        <h1>Openbve Radio</h1>
        <p>Portable radio for OpenBVE multiplayer &nbsp;·&nbsp; <span id="loggedInUser" style="color:#d4a018"></span> &nbsp;<button id="adminPageBtn" type="button" hidden style="background:none;border:none;color:#88aacc;cursor:pointer;font-size:0.8rem;padding:0;text-decoration:underline;">Admin Page</button> &nbsp;<button id="logoutBtn" type="button" style="background:none;border:none;color:#888;cursor:pointer;font-size:0.8rem;padding:0;text-decoration:underline;">Logout</button></p>
      </section>

      <div class="apx-wrapper">

        <!-- Antenna -->
        <div class="apx-antenna" aria-hidden="true">
          <div class="apx-antenna-tip"></div>
          <div class="apx-antenna-whip"></div>
          <div class="apx-antenna-coupling"></div>
        </div>

        <!-- Radio chassis -->
        <section class="apx-radio power-off" id="radioFrame" aria-label="Motorola APX 6000 radio console">

          <!-- Side PTT bar — left edge, functional -->
          <button class="apx-ptt-bar" id="pttBtn" disabled aria-label="Push to Talk">
            <span class="apx-ptt-label">PTT</span>
            <span class="apx-ptt-indicator"></span>
          </button>

          <!-- Side emergency nub — right edge, decorative -->
          <div class="apx-emergency-nub" aria-hidden="true"></div>

          <!-- Top housing with knobs and Motorola badge -->
          <div class="apx-top-housing" aria-hidden="true">
            <div class="apx-knob apx-vol">
              <div class="apx-knob-grip"></div>
              <span class="apx-knob-mark"></span>
            </div>
            <div class="apx-moto-badge">
              <svg class="apx-moto-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="46" fill="#ddd5be" stroke="#b09c6a" stroke-width="3"/>
                <path d="M17,74 L17,32 L50,56 L83,32 L83,74 L73,74 L73,46 L50,64 L27,46 L27,74 Z" fill="#1a1a1a"/>
              </svg>
            </div>
            <div class="apx-top-ports">
              <div class="apx-port apx-port-round"></div>
              <div class="apx-port apx-port-rect"></div>
              <div class="apx-port apx-port-rect"></div>
            </div>
          </div>

          <!-- Main face -->
          <div class="apx-face">

            <!-- Speaker grille — horizontal slots -->
            <div class="apx-speaker" aria-hidden="true">
              <div class="apx-slot"></div>
              <div class="apx-slot"></div>
              <div class="apx-slot"></div>
              <div class="apx-slot"></div>
              <div class="apx-slot"></div>
              <div class="apx-slot"></div>
            </div>

            <!-- Display bezel + screen -->
            <div class="apx-display-bezel">
              <div class="apx-display">
                <div class="apx-status-bar">
                  <span id="serverName" class="apx-server-name">---</span>
                  <div class="apx-status-right">
                    <span id="volumeValue" class="apx-vol-value">100%</span>
                    <span class="apx-signal-bar">
                      <span class="apx-signal-dot" style="--index: 1;"></span>
                      <span class="apx-signal-dot" style="--index: 2;"></span>
                      <span class="apx-signal-dot" style="--index: 3;"></span>
                      <span class="apx-signal-dot" style="--index: 4;"></span>
                    </span>
                    <span id="txLight" class="tx-light idle"></span>
                  </div>
                </div>
                <div class="apx-ch-name">Operations</div>
                <div class="apx-menu">
                  <div class="apx-menu-item">
                    <span class="apx-menu-label">Ch:</span>
                    <span id="menuChannel" class="apx-menu-value">Operators</span>
                    <span id="menuChannelArrows" class="apx-menu-arrows">◀ ▶</span>
                  </div>
                  <div class="apx-menu-item">
                    <span class="apx-menu-label">Role:</span>
                    <span id="menuRole" class="apx-menu-value">Operator</span>
                    <span id="menuRoleArrows" class="apx-menu-arrows">◀ ▶</span>
                  </div>
                  <div class="apx-menu-item">
                    <span class="apx-menu-label">TID:</span>
                    <span id="menuTrainId" class="apx-menu-value">----</span>
                    <span class="apx-menu-arrows">#</span>
                  </div>
                  <div class="apx-menu-item">
                    <span class="apx-menu-label">Mic:</span>
                    <span id="menuMic" class="apx-menu-value">Default</span>
                    <span id="menuMicArrows" class="apx-menu-arrows">◀ ▶</span>
                  </div>
                  <div class="apx-menu-item">
                    <span class="apx-menu-label">Out:</span>
                    <span id="menuOutput" class="apx-menu-value">Default</span>
                    <span id="menuOutputArrows" class="apx-menu-arrows">◀ ▶</span>
                  </div>
                  <div class="apx-menu-item">
                    <span class="apx-menu-label">PTT:</span>
                    <span id="menuPtt" class="apx-menu-value">Space</span>
                    <span class="apx-menu-arrows">OK</span>
                  </div>
                </div>
                <div class="apx-info-rows">
                  <div id="channelState" class="apx-ch-state">Channel idle</div>
                  <div id="status" class="apx-conn">Not connected</div>
                  <div id="serverStatus" class="apx-small-line">Server: offline</div>
                  <div id="userStatus" class="apx-small-line">User: offline</div>
                </div>
                <div class="apx-mic-strip">
                  <canvas id="micCanvas" width="200" height="22"></canvas>
                </div>
              </div>
            </div>

            <!-- Softkey row — below display -->
            <div class="apx-softkey-row">
              <button id="cleanCheckBtn" class="apx-sk clean-check" type="button">Audio Filter</button>
              <button id="joinBtn" class="apx-sk apx-pwr join">PWR</button>
            </div>

            <!-- Navigation cluster -->
            <div class="apx-nav" aria-hidden="true">
              <button id="navLeftBtn" class="apx-fn-btn">◀</button>
              <div class="apx-dpad">
                <button class="apx-dpad-btn apx-dpad-up">▲</button>
                <div class="apx-dpad-row">
                  <button class="apx-dpad-btn apx-dpad-ok">OK</button>
                </div>
                <button class="apx-dpad-btn apx-dpad-dn">▼</button>
              </div>
              <button id="navRightBtn" class="apx-fn-btn">▶</button>
            </div>

            <!-- Configuration + settings tabs -->
            <div class="apx-panel-tabs">
              <!-- Hidden settings controls kept for functionality -->
              <div hidden aria-hidden="true" style="display:none !important;">
                <select id="role">
                  <option value="operator">Operator</option>
                </select>
                <input id="trainId" type="text" value="" inputmode="numeric" pattern="[0-9]*" placeholder="Auto-assigned" />
                <select id="micSelect"><option value="">Default microphone</option></select>
                <select id="outputSelect"><option value="">Default output</option></select>
                <button id="pttKeyCapture" type="button">Space</button>
              </div>
            </div>

            <!-- Numeric keypad (decorative) -->
            <div class="apx-keypad" aria-hidden="true">
              <button class="apx-key" tabindex="-1">1</button>
              <button class="apx-key" tabindex="-1">2<sub>ABC</sub></button>
              <button class="apx-key" tabindex="-1">3<sub>DEF</sub></button>
              <button class="apx-key" tabindex="-1">4<sub>GHI</sub></button>
              <button class="apx-key" tabindex="-1">5<sub>JKL</sub></button>
              <button class="apx-key" tabindex="-1">6<sub>MNO</sub></button>
              <button class="apx-key" tabindex="-1">7<sub>PQRS</sub></button>
              <button class="apx-key" tabindex="-1">8<sub>TUV</sub></button>
              <button class="apx-key" tabindex="-1">9<sub>WXYZ</sub></button>
              <button class="apx-key apx-key-star" tabindex="-1">★</button>
              <button class="apx-key" tabindex="-1">0</button>
              <button class="apx-key apx-key-hash" tabindex="-1">CLR</button>
            </div>

          </div><!-- /apx-face -->

          <!-- Battery pack -->
          <div class="apx-battery" aria-hidden="true">
            <div class="apx-bat-body">
              <div class="apx-bat-contacts">
                <span></span><span></span><span></span><span></span>
              </div>
            </div>
          </div>

        </section><!-- /apx-radio -->
      </div><!-- /apx-wrapper -->

      <div id="rightSidebarStack" class="right-sidebar-stack">
        <aside id="memberSidebar" class="member-sidebar" hidden>
          <h2 class="admin-sidebar-title">&#128101; Users Online</h2>
          <div class="admin-sidebar-section">
            <ul id="peers" class="member-online-list"></ul>
          </div>
        </aside>
      </div>

    </main>

    <script src="client.js"></script>
  </body>
</html>
